name: Build Release APK (mmkv)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: gradle-release-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias tikdown \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass tikdown123 \
            -keypass tikdown123 \
            -dname "CN=TikDown, OU=Mobile, O=TikDown, L=Lagos, ST=Lagos, C=NG"

      - name: Build release APK
        env:
          STORE_FILE: ${{ github.workspace }}/android/app/release.keystore
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password=tikdown123 \
            -Pandroid.injected.signing.key.alias=tikdown \
            -Pandroid.injected.signing.key.password=tikdown123

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tik-down-release-mmkv-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
