name: Build Android Debug APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Install NDK required by Chaquopy (needs NDK ≥ 25)
      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "ndk;27.2.12479018"

      - name: Generate Android project (expo prebuild)
        run: bunx expo prebuild --platform android --no-install
        env:
          # Prevents interactive prompts
          CI: "1"

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.configuration-cache=false \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        # Chaquopy downloads Python + yt-dlp pip packages during this step (~5 min first run)
        # configuration-cache=false: Chaquopy 15 is not yet compatible with Gradle 9 config cache

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tik-down-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
